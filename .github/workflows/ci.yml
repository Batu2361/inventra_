name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inventra_test
          POSTGRES_USER: inventra
          POSTGRES_PASSWORD: inventra
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Build & test
        run: ./gradlew build
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: inventra_test
          DB_USER: inventra
          DB_PASSWORD: inventra
          JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
          JWT_EXPIRATION_MS: 3600000

  frontend:
    name: Frontend — Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
