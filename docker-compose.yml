# =============================================================================
# Inventra – Local development stack
name: inventra   # fixes Docker Compose project name (overrides directory-derived default)
#
# Usage:
#   docker compose up -d             # start full stack (db + backend + frontend)
#   docker compose logs -f app       # follow backend logs
#   docker compose logs -f frontend  # follow frontend logs
#   docker compose down -v           # teardown (removes volumes)
#
# Access:
#   Frontend  →  http://localhost:3000
#   Backend   →  http://localhost:8080
#   Swagger   →  http://localhost:8080/swagger-ui.html
#   pgAdmin   →  http://localhost:5050  (admin@inventra.io / admin)
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: inventra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       inventra
      POSTGRES_USER:     inventra
      POSTGRES_PASSWORD: inventra
    ports:
      - "5433:5432"   # 5432 may be used by a local Postgres instance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventra -d inventra"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    networks:
      - inventra-net

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventra-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # waits until PG passes health check
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST:       db
      DB_PORT:       5432
      DB_NAME:       inventra
      DB_USER:       inventra
      DB_PASSWORD:   inventra
      JWT_SECRET:    404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s   # Flyway migrations need time on first start
    networks:
      - inventra-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventra-frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - inventra-net

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: inventra-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - inventra-net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: inventra-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - inventra-net

  # ── pgAdmin 4 ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: inventra-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@inventra.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"        # single-user mode, no login needed
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro   # pre-wired DB connection
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inventra-net

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  grafana_data:
    driver: local

networks:
  inventra-net:
    driver: bridge
