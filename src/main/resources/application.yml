spring:
  application:
    name: inventra

  # ── Datasource ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventra}
    username: ${DB_USER:inventra}
    password: ${DB_PASSWORD:inventra}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: InventraHikariCP

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns the schema – Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        # Envers: store revision author from security context
        org.hibernate.envers:
          audit_table_suffix: _aud
          revision_field_name: rev
          revision_type_field_name: revtype
          store_data_at_delete: true

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── Security / JWT ──────────────────────────────────────────────────────────
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}      # 24h

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: inventra

info:
  app:
    name: Inventra
    version: "@project.version@"
    description: High-concurrency Warehouse & Inventory Management

# ── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  config: classpath:logback-spring.xml

---
# ╔══════════════════════════════╗
# ║   DEVELOPMENT PROFILE        ║
# ╚══════════════════════════════╝
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

---
# ╔══════════════════════════════╗
# ║   TEST PROFILE (Testcontainers) ║
# ╚══════════════════════════════╝
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
